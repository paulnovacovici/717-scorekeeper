<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">Seven One Seven</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#171b1e"/>
      <stop offset="1" stop-color="#090b0d"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="15" fill="#0b0d0f"/>
  <circle cx="32" cy="30" r="23" fill="#c8ff55" opacity=".08" filter="url(#glow)"/>
  <g font-family="Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">
    <g transform="rotate(-7 18 32)">
      <rect x="8" y="17" width="20" height="31" rx="5" fill="url(#bg)" stroke="#3b4449" stroke-width="1.5"/>
      <text x="18" y="38" fill="#c8ff55">7</text>
    </g>
    <g>
      <rect x="22" y="14" width="20" height="34" rx="5" fill="url(#bg)" stroke="#4b575c" stroke-width="1.5"/>
      <text x="32" y="36" fill="#f4f5f2">1</text>
    </g>
    <g transform="rotate(7 46 32)">
      <rect x="36" y="17" width="20" height="31" rx="5" fill="url(#bg)" stroke="#3b4449" stroke-width="1.5"/>
      <text x="46" y="38" fill="#c8ff55">7</text>
    </g>
  </g>
</svg>
